<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Órdenes y Facturación - Wladimir Cova</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1250px; margin: 0 auto; }
        h2 { color: #1a365d; border-bottom: 2px solid #1a365d; padding-bottom: 10px; margin-bottom: 25px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 13px; color: #4a5568; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { background-color: #1a365d; color: white; border: none; padding: 14px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: background 0.2s; }
        button:hover { background-color: #2a4365; }
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px 10px; text-align: left; }
        th { background-color: #2d3748; color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #f7fafc; }
        .badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; text-align: center; display: inline-block; }
        .badge-si { background-color: #c6f6d5; color: #22543d; }
        .badge-no { background-color: #fed7d7; color: #742a2a; }
        .badge-porcentaje { background-color: #e2e8f0; color: #1a202c; border: 1px solid #cbd5e0; }
        .badge-100 { background-color: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Entregas, Facturación y Pagos</h2>
    
    <div class="card">
        <h3 style="margin-top:0; color:#2b6cb0;">Registrar Nueva Orden</h3>
        
        <form action="TU_ENLACE_AQUI_DE_FORMSPREE" method="POST" id="miFormulario">
            <div class="form-grid">
                <div>
                    <label>Cliente</label>
                    <input type="text" name="Cliente" placeholder="Ej: Visco Orinoco" required>
                </div>
                <div>
                    <label>N° Presupuesto</label>
                    <input type="text" name="N_Presupuesto">
                </div>
                <div>
                    <label>N° Proforma</label>
                    <input type="text" name="N_Proforma">
                </div>
                <div>
                    <label>N° Orden de Compra</label>
                    <input type="text" name="Orden_Compra">
                </div>
                <div>
                    <label>N° Factura</label>
                    <input type="text" name="N_Factura">
                </div>
                <div>
                    <label>Monto Total ($/Bs)</label>
                    <input type="number" name="Monto" step="0.01">
                </div>
                <div>
                    <label>Método de Pago</label>
                    <select name="Metodo_Pago">
                        <option value="Pendiente">Por definir / Pendiente</option>
                        <option value="Efectivo Dol">Efectivo ($)</option>
                        <option value="Transferencia Bs">Bolívares (Bs)</option>
                        <option value="Dólar Físico">Dólar Físico</option>
                        <option value="USDT">USDT (Cripto)</option>
                    </select>
                </div>
                <div>
                    <label>Porcentaje de la OC</label>
                    <select name="Porcentaje_OC" id="porcentajeOc">
                        <option value="100%">100% (Completa)</option>
                        <option value="90%">90%</option>
                        <option value="80%">80%</option>
                        <option value="70%">70%</option>
                        <option value="50%">50%</option>
                    </select>
                </div>
                <div>
                    <label>¿Correo Enviado?</label>
                    <select name="Correo_Enviado">
                        <option value="NO">NO</option>
                        <option value="SÍ">SÍ</option>
                    </select>
                </div>
                <div>
                    <label>¿Factura Entregada?</label>
                    <select name="Factura_Entregada">
                        <option value="NO">NO</option>
                        <option value="SÍ">SÍ</option>
                    </select>
                </div>
            </div>
            <button type="submit">Guardar Registro en la Nube</button>
        </form>
    </div>
</div>

</body>
</html>
