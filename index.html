<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control Financiero - Wladimir Cova 360</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1319;
            color: #e0e6ed;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00ffcc;
            text-align: center;
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .card {
            background-color: #14212c;
            border: 1px solid #1f3647;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card h2 {
            color: #00ffcc;
            margin-top: 0;
            border-bottom: 1px solid #1f3647;
            padding-bottom: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 12px;
            color: #8fa0ae;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .form-group input, .form-group select {
            background-color: #0b1319;
            border: 1px solid #2c4a61;
            border-radius: 4px;
            padding: 8px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            border-color: #00ffcc;
            outline: none;
        }
        .btn {
            background-color: #00ffcc;
            color: #0b1319;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #00cc99;
        }
        .btn-block {
            grid-column: 1 / -1;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #14212c;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1f3647;
